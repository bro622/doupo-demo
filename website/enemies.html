<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>敌人图鉴 — 斗破苍穹·斗帝之路</title>
<meta name="description" content="斗破苍穹·斗帝之路全部敌人图鉴，50+敌人按场景和类型筛选浏览。">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ROOT & RESET
   ═══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --parchment: #f4efe4;
  --parchment-l: #faf7f0;
  --parchment-d: #e8dfce;
  --ink: #1e1a14;
  --ink-soft: #3d3428;
  --ink-muted: #7a6e5d;
  --ink-ghost: #b5a892;
  --gold: #b8963e;
  --gold-light: #d4b45c;
  --gold-dim: rgba(184,150,62,0.12);
  --cinnabar: #c23a2b;
  --jade: #4a7c59;
  --sapphire: #3a6b8c;
  --serif: 'Noto Serif SC', 'ZCOOL XiaoWei', serif;
  --sans: 'Noto Sans SC', 'PingFang SC', sans-serif;
  --display: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
  --nav-bg: rgba(244,239,228,0.88);
  --nav-bg-solid: rgba(244,239,228,0.96);
  --shadow-color: rgba(30,26,20,0.06);
}
[data-theme="dark"] {
  --parchment: #1a1714;
  --parchment-l: #222019;
  --parchment-d: #2a2720;
  --ink: #f0e6d3;
  --ink-soft: #d4c5a9;
  --ink-muted: #a89880;
  --ink-ghost: #7a6e5d;
  --gold-dim: rgba(184,150,62,0.18);
  --nav-bg: rgba(26,23,20,0.88);
  --nav-bg-solid: rgba(26,23,20,0.96);
  --shadow-color: rgba(0,0,0,0.2);
}
[data-theme="dark"] body::before { opacity: 0.015; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--parchment);
  color: var(--ink);
  font-family: var(--sans);
  line-height: 1.7;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}
::selection { background: var(--gold-dim); color: var(--ink); }

/* ═══════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(24px, 5vw, 64px);
  background: var(--nav-bg);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  border-bottom: 1px solid rgba(184,150,62,0.15);
  z-index: 1000;
  transition: background 0.3s;
}
nav.scrolled {
  background: var(--nav-bg-solid);
  box-shadow: 0 1px 24px var(--shadow-color);
}
.nav-brand {
  font-family: var(--display);
  font-size: 20px;
  color: var(--ink);
  letter-spacing: 3px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-brand::before {
  content: '';
  display: inline-block;
  width: 32px; height: 32px;
  background: url('assets/icon.png') center/cover no-repeat;
  border-radius: 6px;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  height: 100%;
  flex-wrap: nowrap;
  overflow: hidden;
}
.nav-links a {
  display: inline-flex;
  align-items: center;
  height: 100%;
  text-decoration: none;
  color: var(--ink-muted);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 1px;
  position: relative;
  transition: color 0.25s;
}
.nav-links a:not(.nav-cta):hover { color: var(--ink); }
.nav-links a.active { color: var(--ink); }
.nav-links a:not(.nav-cta)::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--gold);
  transform: scaleX(0);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.nav-links a.active::after,
.nav-links a:not(.nav-cta):hover::after { transform: scaleX(1); }
.nav-cta {
  display: inline-flex !important;
  align-items: center !important;
  height: auto !important;
  padding: 8px 24px !important;
  background: var(--ink) !important;
  color: var(--parchment) !important;
  border-radius: 6px !important;
  font-size: 13px !important;
  font-weight: 600 !important;
  letter-spacing: 1.5px !important;
  transition: background 0.25s, transform 0.2s !important;
}
.nav-cta:hover {
  background: var(--ink-soft) !important;
  transform: translateY(-1px);
}
.theme-toggle {
  background: none;
  border: 1px solid var(--parchment-d);
  border-radius: 6px;
  width: 36px; height: 36px;
  cursor: pointer;
  font-size: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
  color: var(--ink-muted);
  flex-shrink: 0;
}
.theme-toggle:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-dim);
}
.hamburger {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  z-index: 1001;
}
.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--ink);
  margin: 5px 0;
  transition: all 0.3s;
}

/* ═══════════════════════════════════════════
   PAGE HEADER
   ═══════════════════════════════════════════ */
.page-header {
  text-align: center;
  padding: 48px 24px 32px;
  position: relative;
}
.page-header h1 {
  font-family: var(--display);
  font-size: clamp(28px, 4vw, 40px);
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 6px;
}
.page-header .page-en {
  font-size: 11px;
  color: var(--ink-ghost);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-top: 6px;
}
.page-header .page-line {
  width: 48px;
  height: 2px;
  background: var(--gold);
  margin: 20px auto 0;
}

/* ═══════════════════════════════════════════
   FILTERS
   ═══════════════════════════════════════════ */
.filters {
  padding: 0 clamp(24px, 5vw, 64px) 8px;
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
  justify-content: center;
}
.filter-group {
  display: flex;
  gap: 2px;
  background: var(--parchment-l);
  border: 1px solid var(--parchment-d);
  border-radius: 8px;
  padding: 3px;
}
.filter-btn {
  padding: 7px 16px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--ink-muted);
  font-size: 13px;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.filter-btn:hover {
  color: var(--ink);
  background: rgba(184,150,62,0.06);
}
.filter-btn.active {
  background: var(--ink);
  color: var(--parchment);
  box-shadow: 0 2px 8px rgba(30,26,20,0.15);
}
.filter-sep {
  width: 1px;
  height: 28px;
  background: var(--parchment-d);
  flex-shrink: 0;
}
.enemy-count {
  font-size: 13px;
  color: var(--ink-ghost);
  letter-spacing: 1px;
  font-weight: 500;
  padding: 8px 0;
}

/* ═══════════════════════════════════════════
   ENEMY GRID
   ═══════════════════════════════════════════ */
.enemy-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
  padding: 32px clamp(24px, 5vw, 64px) 80px;
  max-width: 1200px;
  margin: 0 auto;
}
.enemy-item {
  background: var(--parchment-l);
  border: 2px solid var(--parchment-d);
  border-radius: 12px;
  padding: 20px 16px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
}
.enemy-item:hover {
  transform: translateY(-6px);
  border-color: var(--gold);
  box-shadow: 0 16px 40px rgba(30,26,20,0.1), 0 0 0 1px var(--gold), 0 0 16px rgba(184,150,62,0.15);
}
.enemy-item.normal:hover {
  box-shadow: 0 16px 40px rgba(30,26,20,0.1), 0 0 0 1px var(--gold), 0 0 16px rgba(184,150,62,0.15);
}
.enemy-item.elite:hover {
  border-color: var(--sapphire);
  box-shadow: 0 16px 40px rgba(58,107,140,0.12), 0 0 0 1px var(--sapphire), 0 0 16px rgba(58,107,140,0.15);
}
.enemy-item.boss:hover {
  border-color: var(--cinnabar);
  box-shadow: 0 16px 40px rgba(194,58,43,0.12), 0 0 0 1px var(--cinnabar), 0 0 16px rgba(194,58,43,0.15);
}
.enemy-sprite {
  width: 80px;
  height: 80px;
  margin: 0 auto 12px;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}
.enemy-sprite img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  transition: transform 0.3s;
}
.enemy-item:hover .enemy-sprite img {
  transform: scale(1.1);
}
.enemy-name {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}
.enemy-hp {
  font-size: 12px;
  color: var(--ink-muted);
  margin-bottom: 4px;
}
.enemy-type {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  display: inline-block;
}
.enemy-type.normal {
  background: var(--parchment-d);
  color: var(--ink-muted);
}
.enemy-type.elite {
  background: rgba(58,107,140,0.1);
  color: var(--sapphire);
}
.enemy-type.boss {
  background: rgba(194,58,43,0.1);
  color: var(--cinnabar);
}

/* ═══════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════ */
footer {
  text-align: center;
  padding: 48px 24px;
  border-top: 1px solid var(--parchment-d);
  background: var(--parchment-l);
}
footer p {
  font-size: 13px;
  color: var(--ink-ghost);
  letter-spacing: 1px;
}
footer a {
  color: var(--gold);
  text-decoration: none;
}
footer .footer-divider {
  width: 24px;
  height: 1px;
  background: var(--ink-ghost);
  margin: 16px auto;
}

/* ═══════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════ */
@media (max-width: 900px) {
  .nav-links { gap: 20px; }
  .nav-links a:not(.nav-cta) { font-size: 13px; letter-spacing: 0.5px; }
}
@media (max-width: 768px) {
  .enemy-grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
    padding: 20px 16px 60px;
  }
  .filters { gap: 10px; padding: 0 16px 8px; }
  .filter-group { padding: 2px; }
  .filter-btn { padding: 6px 12px; font-size: 12px; }
  .page-header { padding: 36px 16px 24px; }
}
@media (max-width: 640px) {
  .nav-links { gap: 16px; }
  .nav-links a:not(.nav-cta) { font-size: 13px; }
  .hamburger { display: block; }
  .nav-links {
    position: fixed;
    top: 0;
    right: -100%;
    width: 280px;
    height: 100vh;
    background: var(--parchment);
    flex-direction: column;
    padding: 80px 24px 24px;
    transition: right 0.3s;
    box-shadow: -4px 0 20px rgba(0,0,0,0.1);
  }
  .nav-links.active { right: 0; }
  .nav-links a { height: auto; padding: 12px 0; font-size: 16px; }
  .filter-btn { min-height: 44px; min-width: 44px; }
  .enemy-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 16px 12px 48px;
  }
  .filter-sep { display: none; }
  .filters { justify-content: center; }
}
</style>
</head>
<body>

<!-- Navigation -->
<nav id="nav">
  <a href="index.html" class="nav-brand">斗破苍穹</a>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="cards.html">图鉴</a>
    <a href="relics.html">遗物</a>
    <a href="events.html">事件</a>
    <a href="enemies.html" class="active">敌人</a>
    <a href="download.html" class="nav-cta">下载 Demo</a>
    <button class="theme-toggle" id="theme-toggle" aria-label="切换暗色模式">☽</button>
  </div>
  <button class="hamburger" id="hamburger" aria-label="菜单">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<!-- Page Header -->
<div class="page-header">
  <h1>敌人图鉴</h1>
  <div class="page-en">Enemy Codex</div>
  <div class="page-line"></div>
</div>

<!-- Filters -->
<div class="filters" id="filters">
  <div class="filter-group" data-group="scene">
    <button class="filter-btn active" data-value="all">全部</button>
    <button class="filter-btn" data-value="scene1">加玛帝国</button>
    <button class="filter-btn" data-value="scene2">黑角域</button>
    <button class="filter-btn" data-value="scene3">迦南学院</button>
    <button class="filter-btn" data-value="scene4">中州</button>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group" data-group="type">
    <button class="filter-btn active" data-value="all">全部</button>
    <button class="filter-btn" data-value="normal">普通</button>
    <button class="filter-btn" data-value="elite">精英</button>
    <button class="filter-btn" data-value="boss">Boss</button>
  </div>
  <div class="enemy-count" id="count"></div>
</div>

<!-- Enemy Grid -->
<div class="enemy-grid" id="grid"></div>

<!-- Footer -->
<footer>
  <p>斗破苍穹·斗帝之路 — 基于《斗破苍穹》的同人卡牌 Roguelike 游戏</p>
  <div class="footer-divider"></div>
  <p>Made with ❤️ and <a href="https://godotengine.org" target="_blank">Godot Engine</a></p>
</footer>

<script src="enemies-data.js"></script>
<script>
// Theme toggle
const toggle = document.getElementById('theme-toggle');
const stored = localStorage.getItem('theme');
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const initial = stored || (prefersDark ? 'dark' : 'light');
document.documentElement.setAttribute('data-theme', initial);
toggle.textContent = initial === 'dark' ? '☀' : '☽';
toggle.addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  toggle.textContent = next === 'dark' ? '☀' : '☽';
});

// Hamburger menu
const hamburger = document.getElementById('hamburger');
const navLinks = document.querySelector('.nav-links');
if (hamburger && navLinks) {
  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('active');
  });
  navLinks.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('active');
    });
  });
}

// Nav scroll effect
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

// Enemy gallery
const TYPE_LABELS = { normal: '普通', elite: '精英', boss: 'Boss' };
const SCENE_LABELS = {
  scene1: '加玛帝国',
  scene2: '黑角域',
  scene3: '迦南学院',
  scene4: '中州'
};
const state = { scene: 'all', type: 'all' };
const grid = document.getElementById('grid');
const countEl = document.getElementById('count');

function renderEnemies() {
  grid.innerHTML = '';
  let visible = 0;
  ENEMIES.forEach(enemy => {
    const matchScene = state.scene === 'all' || enemy.scene === state.scene;
    const matchType = state.type === 'all' || enemy.type === state.type;
    if (!matchScene || !matchType) return;
    visible++;

    const div = document.createElement('div');
    div.className = `enemy-item ${enemy.type}`;
    div.innerHTML = `
      <div class="enemy-sprite">
        <img src="assets/enemies/${enemy.sprite}" alt="${enemy.name}" loading="lazy">
      </div>
      <div class="enemy-name">${enemy.name}</div>
      <div class="enemy-hp">HP: ${enemy.hp}</div>
      <div class="enemy-type ${enemy.type}">${TYPE_LABELS[enemy.type] || enemy.type}</div>
    `;
    grid.appendChild(div);
  });
  countEl.textContent = `${visible} 个`;
}

// Filters
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  const group = btn.closest('.filter-group').dataset.group;
  state[group] = btn.dataset.value;
  btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEnemies();
});

renderEnemies();
</script>
</body>
</html>
