<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搜索 — 斗破苍穹·斗帝之路</title>
<meta name="description" content="搜索斗破苍穹·斗帝之路游戏内容，包括卡牌、遗物、事件、敌人。">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ROOT & RESET
   ═══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --parchment: #f4efe4;
  --parchment-l: #faf7f0;
  --parchment-d: #e8dfce;
  --ink: #1e1a14;
  --ink-soft: #3d3428;
  --ink-muted: #7a6e5d;
  --ink-ghost: #b5a892;
  --gold: #b8963e;
  --gold-light: #d4b45c;
  --gold-dim: rgba(184,150,62,0.12);
  --cinnabar: #c23a2b;
  --jade: #4a7c59;
  --sapphire: #3a6b8c;
  --serif: 'Noto Serif SC', 'ZCOOL XiaoWei', serif;
  --sans: 'Noto Sans SC', 'PingFang SC', sans-serif;
  --display: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
  --nav-bg: rgba(244,239,228,0.88);
  --nav-bg-solid: rgba(244,239,228,0.96);
  --shadow-color: rgba(30,26,20,0.06);
}
[data-theme="dark"] {
  --parchment: #1a1714;
  --parchment-l: #222019;
  --parchment-d: #2a2720;
  --ink: #f0e6d3;
  --ink-soft: #d4c5a9;
  --ink-muted: #a89880;
  --ink-ghost: #7a6e5d;
  --gold-dim: rgba(184,150,62,0.18);
  --nav-bg: rgba(26,23,20,0.88);
  --nav-bg-solid: rgba(26,23,20,0.96);
  --shadow-color: rgba(0,0,0,0.2);
}
[data-theme="dark"] body::before { opacity: 0.015; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--parchment);
  color: var(--ink);
  font-family: var(--sans);
  line-height: 1.7;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}
::selection { background: var(--gold-dim); color: var(--ink); }

/* ═══════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(24px, 5vw, 64px);
  background: var(--nav-bg);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  border-bottom: 1px solid rgba(184,150,62,0.15);
  z-index: 1000;
  transition: background 0.3s;
}
.nav-brand {
  font-family: var(--display);
  font-size: 20px;
  color: var(--ink);
  letter-spacing: 3px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-brand::before {
  content: '';
  display: inline-block;
  width: 32px; height: 32px;
  background: url('assets/icon.png') center/cover no-repeat;
  border-radius: 6px;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  height: 100%;
  flex-wrap: nowrap;
  overflow: hidden;
}
.nav-links a {
  display: inline-flex;
  align-items: center;
  height: 100%;
  text-decoration: none;
  color: var(--ink-muted);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 1px;
  position: relative;
  transition: color 0.25s;
}
.nav-links a:not(.nav-cta):hover { color: var(--ink); }
.nav-links a.active { color: var(--ink); }
.nav-links a:not(.nav-cta)::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--gold);
  transform: scaleX(0);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.nav-links a.active::after,
.nav-links a:not(.nav-cta):hover::after { transform: scaleX(1); }
.nav-cta {
  display: inline-flex !important;
  align-items: center !important;
  height: auto !important;
  padding: 8px 24px !important;
  background: var(--ink) !important;
  color: var(--parchment) !important;
  border-radius: 6px !important;
  font-size: 13px !important;
  font-weight: 600 !important;
  letter-spacing: 1.5px !important;
  transition: background 0.25s, transform 0.2s !important;
}
.nav-cta:hover {
  background: var(--ink-soft) !important;
  transform: translateY(-1px);
}
.theme-toggle {
  background: none;
  border: 1px solid var(--parchment-d);
  border-radius: 6px;
  width: 36px; height: 36px;
  cursor: pointer;
  font-size: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
  color: var(--ink-muted);
  flex-shrink: 0;
}
.theme-toggle:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-dim);
}
.hamburger {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  z-index: 1001;
}
.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--ink);
  margin: 5px 0;
  transition: all 0.3s;
}

/* ═══════════════════════════════════════════
   SEARCH
   ═══════════════════════════════════════════ */
.search-section {
  max-width: 800px;
  margin: 100px auto 40px;
  padding: 0 24px;
}
.search-header {
  text-align: center;
  margin-bottom: 32px;
}
.search-header h1 {
  font-family: var(--display);
  font-size: clamp(28px, 4vw, 40px);
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 6px;
}
.search-header .search-en {
  font-size: 11px;
  color: var(--ink-ghost);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-top: 6px;
}
.search-header .search-line {
  width: 48px;
  height: 2px;
  background: var(--gold);
  margin: 20px auto 0;
}
.search-box {
  position: relative;
  margin-bottom: 16px;
}
.search-input {
  width: 100%;
  padding: 16px 52px 16px 20px;
  font-size: 16px;
  font-family: var(--sans);
  border: 2px solid var(--parchment-d);
  border-radius: 12px;
  background: var(--parchment-l);
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 4px var(--gold-dim);
}
.search-input::placeholder {
  color: var(--ink-ghost);
}
.search-clear {
  position: absolute;
  top: 50%;
  right: 12px;
  width: 32px;
  height: 32px;
  transform: translateY(-50%);
  border: 0;
  border-radius: 6px;
  background: transparent;
  color: var(--ink-muted);
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
}
.search-clear.visible { display: inline-flex; }
.search-clear:hover {
  background: var(--gold-dim);
  color: var(--ink);
}
.search-meta {
  text-align: center;
  font-size: 13px;
  color: var(--ink-ghost);
  margin-bottom: 16px;
  letter-spacing: 1px;
}
.type-filters {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
}
.type-filter {
  flex: 0 0 auto;
  min-height: 34px;
  padding: 6px 14px;
  border: 1px solid var(--parchment-d);
  border-radius: 6px;
  background: var(--parchment-l);
  color: var(--ink-muted);
  font-family: var(--sans);
  font-size: 13px;
  white-space: nowrap;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.type-filter:hover,
.type-filter.active {
  border-color: var(--gold);
  color: var(--ink);
  background: var(--gold-dim);
}

/* Results */
.results {
  margin-top: 24px;
}
.results-count {
  font-size: 13px;
  color: var(--ink-ghost);
  margin-bottom: 16px;
  letter-spacing: 1px;
}
.result-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  background: var(--parchment-l);
  border: 1px solid var(--parchment-d);
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  color: var(--ink);
}
.result-item:hover {
  border-color: var(--gold);
  box-shadow: 0 4px 12px rgba(30,26,20,0.08);
  transform: translateY(-2px);
}
.result-icon {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 700;
  flex-shrink: 0;
}
.result-icon.card { background: rgba(184,150,62,0.1); }
.result-icon.relic { background: rgba(58,107,140,0.1); }
.result-icon.event { background: rgba(74,124,57,0.1); }
.result-icon.enemy { background: rgba(194,58,43,0.1); }
.result-content {
  flex: 1;
  min-width: 0;
}
.result-title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}
.result-desc {
  font-size: 13px;
  color: var(--ink-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.result-meta {
  font-size: 12px;
  color: var(--ink-ghost);
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.result-type {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}
.result-type.card { background: rgba(184,150,62,0.1); color: var(--gold); }
.result-type.relic { background: rgba(58,107,140,0.1); color: var(--sapphire); }
.result-type.event { background: rgba(74,124,57,0.1); color: var(--jade); }
.result-type.enemy { background: rgba(194,58,43,0.1); color: var(--cinnabar); }

.no-results {
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-ghost);
}
.initial-state {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 24px;
}
.initial-tile {
  padding: 14px;
  border: 1px solid var(--parchment-d);
  border-radius: 8px;
  background: var(--parchment-l);
  text-align: center;
}
.initial-num {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 16px;
}
.initial-label {
  font-size: 12px;
  color: var(--ink-muted);
  letter-spacing: 1px;
}

/* Footer */
footer {
  text-align: center;
  padding: 48px 24px;
  border-top: 1px solid var(--parchment-d);
  background: var(--parchment-l);
  margin-top: 40px;
}
footer p {
  font-size: 13px;
  color: var(--ink-ghost);
  letter-spacing: 1px;
}
footer a {
  color: var(--gold);
  text-decoration: none;
}

/* Responsive */
@media (max-width: 900px) {
  .nav-links { gap: 20px; }
  .nav-links a:not(.nav-cta) { font-size: 13px; letter-spacing: 0.5px; }
}
@media (max-width: 640px) {
  .nav-links { gap: 16px; }
  .nav-links a:not(.nav-cta) { font-size: 13px; }
  .hamburger { display: block; }
  .nav-links {
    position: fixed;
    top: 0;
    right: -100%;
    width: 280px;
    height: 100vh;
    background: var(--parchment);
    flex-direction: column;
    padding: 80px 24px 24px;
    transition: right 0.3s;
    box-shadow: -4px 0 20px rgba(0,0,0,0.1);
  }
  .nav-links.active { right: 0; }
  .nav-links a { height: auto; padding: 12px 0; font-size: 16px; }
  .search-section { margin-top: 80px; }
  .type-filters {
    justify-content: flex-start;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .result-item { flex-direction: column; align-items: flex-start; }
  .result-content { width: 100%; }
  .result-desc,
  .result-meta {
    white-space: normal;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .result-type { align-self: flex-start; }
  .initial-state { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<nav id="nav">
  <a href="index.html" class="nav-brand">斗破苍穹</a>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="cards.html">图鉴</a>
    <a href="relics.html">遗物</a>
    <a href="events.html">事件</a>
    <a href="enemies.html">敌人</a>
    <a href="search.html" class="active">搜索</a>
    <a href="download.html" class="nav-cta">下载 Demo</a>
    <button class="theme-toggle" id="theme-toggle" aria-label="切换暗色模式">☽</button>
  </div>
  <button class="hamburger" id="hamburger" aria-label="菜单">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<div class="search-section">
  <div class="search-header">
    <h1>搜索</h1>
    <div class="search-en">Search</div>
    <div class="search-line"></div>
  </div>

  <div class="search-box">
    <input type="text" class="search-input" id="searchInput" placeholder="搜索卡牌、遗物、事件、敌人..." autofocus>
    <button class="search-clear" id="searchClear" aria-label="清空搜索">×</button>
  </div>
  <div class="search-meta" id="searchMeta"></div>
  <div class="type-filters" id="typeFilters" aria-label="搜索类型">
    <button class="type-filter active" data-type="all">全部</button>
    <button class="type-filter" data-type="card">卡牌</button>
    <button class="type-filter" data-type="relic">遗物</button>
    <button class="type-filter" data-type="event">事件</button>
    <button class="type-filter" data-type="enemy">敌人</button>
  </div>

  <div class="results" id="results"></div>
</div>

<footer>
  <p>斗破苍穹·斗帝之路 — 基于《斗破苍穹》的同人卡牌 Roguelike 游戏</p>
  <p style="margin-top: 8px;">Made with ❤️ and <a href="https://godotengine.org" target="_blank">Godot Engine</a></p>
</footer>

<script src="cards-data.js"></script>
<script src="relics-data.js"></script>
<script src="events-data.js"></script>
<script src="enemies-data.js"></script>
<script>
// Theme
const toggle = document.getElementById('theme-toggle');
const stored = localStorage.getItem('theme');
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const initial = stored || (prefersDark ? 'dark' : 'light');
document.documentElement.setAttribute('data-theme', initial);
toggle.textContent = initial === 'dark' ? '☀' : '☽';
toggle.addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  toggle.textContent = next === 'dark' ? '☀' : '☽';
});

// Hamburger
const hamburger = document.getElementById('hamburger');
const navLinks = document.querySelector('.nav-links');
if (hamburger && navLinks) {
  hamburger.addEventListener('click', () => navLinks.classList.toggle('active'));
  navLinks.querySelectorAll('a').forEach(l => l.addEventListener('click', () => navLinks.classList.remove('active')));
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// Search
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const resultsDiv = document.getElementById('results');
const searchMeta = document.getElementById('searchMeta');
const typeFilters = document.getElementById('typeFilters');
const TYPE_LABELS = { ATTACK: '攻击', SKILL: '技能', ABILITY: '能力', CURSE: '诅咒', STATUS: '状态' };
const RARITY_LABELS = { COMMON: '普通', RARE: '稀有', EPIC: '史诗', LEGENDARY: '传说' };
const CHAR_LABELS = { xiaoyan: '萧炎', xuner: '薰儿', cailin: '彩鳞', shared: '通用', '': '通用' };
const ENEMY_TYPE_LABELS = { normal: '普通', elite: '精英', boss: 'Boss' };
const SCENE_LABELS = { scene1: '加玛帝国', scene2: '黑角域', scene3: '迦南学院', scene4: '中州' };
const EVENT_CATEGORY_LABELS = { PLOT: '剧情', COMBAT: '战斗', REWARD: '奖励', RISK: '风险', SPECIAL: '特殊' };
const RESULT_LABELS = { card: '卡牌', relic: '遗物', event: '事件', enemy: '敌人' };
const RESULT_MARKS = { card: '卡', relic: '遗', event: '事', enemy: '敌' };
let activeType = 'all';

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function normalize(text) {
  return String(text || '').toLowerCase().replace(/\s+/g, ' ').trim();
}

function formatPreviewText(text) {
  return String(text || '').replace(/\\n|\n/g, ' ').replace(/\s+/g, ' ').trim();
}

function flatText(value) {
  if (value == null) return '';
  if (Array.isArray(value)) return value.map(flatText).join(' ');
  if (typeof value === 'object') return Object.values(value).map(flatText).join(' ');
  return String(value);
}

function buildSearchIndex() {
  const index = [];

  if (typeof CARDS !== 'undefined') {
    CARDS.forEach(card => {
      const title = card.name || card.id;
      const meta = [
        CHAR_LABELS[card.character] || card.character,
        RARITY_LABELS[card.rarity] || card.rarity,
        TYPE_LABELS[card.type] || card.type,
        `${card.cost < 0 ? 'X' : card.cost}费`
      ].filter(Boolean).join(' · ');
      index.push({
        type: 'card',
        id: card.id,
        title,
        desc: card.detail || card.desc || card.upgradedDetail || card.upgraded || '',
        meta,
        url: `cards.html?card=${encodeURIComponent(card.id)}`,
        text: flatText(card)
      });
    });
  }

  if (typeof RELICS !== 'undefined') {
    RELICS.forEach(relic => {
      const meta = [
        RARITY_LABELS[relic.rarity] || relic.rarity,
        relic.exclusive ? `${CHAR_LABELS[relic.exclusive] || relic.exclusive}专属` : '通用'
      ].filter(Boolean).join(' · ');
      index.push({
        type: 'relic',
        id: relic.id,
        title: relic.name,
        desc: relic.desc || '',
        meta,
        url: `relics.html?relic=${encodeURIComponent(relic.id)}`,
        text: flatText(relic)
      });
    });
  }

  if (typeof EVENTS !== 'undefined') {
    EVENTS.forEach(event => {
      const sceneName = event.scene_id ? `场景${event.scene_id}` : '序章';
      const meta = [
        sceneName,
        EVENT_CATEGORY_LABELS[event.category] || event.category,
        event.character ? `${CHAR_LABELS[event.character] || event.character}专属` : ''
      ].filter(Boolean).join(' · ');
      index.push({
        type: 'event',
        id: event.id,
        title: event.name,
        desc: formatPreviewText(event.description),
        meta,
        url: `event-detail.html?id=${encodeURIComponent(event.id)}`,
        text: flatText(event)
      });
    });
  }

  if (typeof ENEMIES !== 'undefined') {
    ENEMIES.forEach(enemy => {
      const meta = [
        SCENE_LABELS[enemy.scene] || enemy.scene,
        ENEMY_TYPE_LABELS[enemy.type] || enemy.type,
        `HP ${enemy.hp}`
      ].filter(Boolean).join(' · ');
      index.push({
        type: 'enemy',
        id: enemy.id,
        title: enemy.name,
        desc: (enemy.actions || []).map(action => action.name).filter(Boolean).join(' / '),
        meta,
        url: `enemy-detail.html?id=${encodeURIComponent(enemy.id)}`,
        text: flatText(enemy)
      });
    });
  }

  return index.map(item => ({
    ...item,
    haystack: normalize([item.id, item.title, item.desc, item.meta, item.text].join(' '))
  }));
}

const searchIndex = buildSearchIndex();

function scoreItem(item, query) {
  const q = normalize(query);
  const tokens = q.split(' ').filter(Boolean);
  if (!q || tokens.length === 0) return 0;
  if (activeType !== 'all' && item.type !== activeType) return 0;

  const title = normalize(item.title);
  const id = normalize(item.id);
  const desc = normalize(item.desc);
  const meta = normalize(item.meta);
  let score = 0;

  for (const token of tokens) {
    if (!item.haystack.includes(token)) return 0;
    if (title === token) score += 120;
    else if (title.startsWith(token)) score += 80;
    else if (title.includes(token)) score += 55;
    else if (id === token) score += 70;
    else if (id.includes(token)) score += 35;
    else if (meta.includes(token)) score += 24;
    else if (desc.includes(token)) score += 16;
    else score += 8;
  }

  return score - Math.min(item.title.length, 30) * 0.1;
}

function renderInitialState() {
  const counts = searchIndex.reduce((acc, item) => {
    acc[item.type] = (acc[item.type] || 0) + 1;
    return acc;
  }, {});
  searchMeta.textContent = `${searchIndex.length} 个条目已索引`;
  resultsDiv.innerHTML = `
    <div class="initial-state">
      ${['card','relic','event','enemy'].map(type => `
        <div class="initial-tile">
          <div class="initial-num">${counts[type] || 0}</div>
          <div class="initial-label">${RESULT_LABELS[type]}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function updateUrl(query) {
  const params = new URLSearchParams();
  if (query) params.set('q', query);
  if (activeType !== 'all') params.set('type', activeType);
  const nextUrl = `${window.location.pathname}${params.toString() ? `?${params}` : ''}`;
  window.history.replaceState(null, '', nextUrl);
}

function search(query) {
  const q = query.trim();
  searchClear.classList.toggle('visible', q.length > 0);
  updateUrl(q);
  if (!q) {
    renderInitialState();
    return;
  }

  const results = searchIndex
    .map(item => ({ ...item, score: scoreItem(item, q) }))
    .filter(item => item.score > 0)
    .sort((a, b) => b.score - a.score || a.title.localeCompare(b.title, 'zh-CN'));

  if (results.length === 0) {
    searchMeta.textContent = '没有匹配结果';
    resultsDiv.innerHTML = `
      <div class="no-results">
        <p>未找到 "${escapeHtml(query)}" 相关内容</p>
      </div>
    `;
    return;
  }

  searchMeta.textContent = `找到 ${results.length} 个结果`;
  resultsDiv.innerHTML = `
    ${results.slice(0, 50).map(r => `
      <a href="${r.url}" class="result-item">
        <div class="result-icon ${r.type}">${RESULT_MARKS[r.type]}</div>
        <div class="result-content">
          <div class="result-title">${escapeHtml(r.title)}</div>
          <div class="result-desc">${escapeHtml(r.desc)}</div>
          <div class="result-meta">${escapeHtml(r.meta)}</div>
        </div>
        <span class="result-type ${r.type}">${RESULT_LABELS[r.type]}</span>
      </a>
    `).join('')}
  `;
}

typeFilters.addEventListener('click', e => {
  const btn = e.target.closest('.type-filter');
  if (!btn) return;
  activeType = btn.dataset.type;
  typeFilters.querySelectorAll('.type-filter').forEach(item => item.classList.remove('active'));
  btn.classList.add('active');
  search(searchInput.value);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchInput.focus();
  search('');
});

searchInput.addEventListener('input', e => search(e.target.value));

const params = new URLSearchParams(window.location.search);
const initialType = params.get('type');
if (initialType && RESULT_LABELS[initialType]) {
  activeType = initialType;
  typeFilters.querySelectorAll('.type-filter').forEach(item => {
    item.classList.toggle('active', item.dataset.type === activeType);
  });
}
const initialQuery = params.get('q') || '';
searchInput.value = initialQuery;
search(initialQuery);
</script>
</body>
</html>
