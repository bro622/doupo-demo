<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡牌图鉴 — 斗破苍穹·斗帝之路</title>
<meta name="description" content="斗破苍穹·斗帝之路全部卡牌图鉴，按角色、类型、品质筛选浏览。">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ROOT & RESET
   ═══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --parchment:   #f4efe4;
  --parchment-l: #faf7f0;
  --parchment-d: #e8dfce;
  --ink:         #1e1a14;
  --ink-soft:    #3d3428;
  --ink-muted:   #7a6e5d;
  --ink-ghost:   #b5a892;
  --gold:        #b8963e;
  --gold-light:  #d4b45c;
  --gold-dim:    rgba(184,150,62,0.12);
  --gold-glow:   rgba(184,150,62,0.25);
  --cinnabar:    #c23a2b;
  --jade:        #4a7c59;
  --sapphire:    #3a6b8c;
  --serif:       'Noto Serif SC', 'ZCOOL XiaoWei', serif;
  --sans:        'Noto Sans SC', 'PingFang SC', sans-serif;
  --display:     'ZCOOL XiaoWei', 'Noto Serif SC', serif;
  --rare-blue:   #3a6b8c;
  --legend-gold: #b8963e;
  --nav-bg:      rgba(244,239,228,0.92);
  --nav-bg-solid:rgba(244,239,228,0.96);
  --shadow-color:rgba(30,26,20,0.06);
}
[data-theme="dark"] {
  --parchment:   #1a1714;
  --parchment-l: #222019;
  --parchment-d: #2a2720;
  --ink:         #f0e6d3;
  --ink-soft:    #d4c5a9;
  --ink-muted:   #a89880;
  --ink-ghost:   #7a6e5d;
  --gold-dim:    rgba(184,150,62,0.18);
  --gold-glow:   rgba(184,150,62,0.3);
  --nav-bg:      rgba(26,23,20,0.92);
  --nav-bg-solid:rgba(26,23,20,0.96);
  --shadow-color:rgba(0,0,0,0.2);
}
[data-theme="dark"] body::before { opacity: 0.015; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--parchment);
  color: var(--ink);
  font-family: var(--sans);
  line-height: 1.7;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}
::selection { background: var(--gold-dim); color: var(--ink); }

/* ═══════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════ */
nav {
  position: sticky;
  top: 0;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(24px, 5vw, 64px);
  background: var(--nav-bg);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  border-bottom: 1px solid rgba(184,150,62,0.15);
  z-index: 1000;
}
.nav-brand {
  font-family: var(--display);
  font-size: 20px;
  color: var(--ink);
  letter-spacing: 3px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-brand::before {
  content: '';
  display: inline-block;
  width: 32px; height: 32px;
  background: url('assets/icon.png') center/cover no-repeat;
  border-radius: 6px;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  height: 100%;
}
.nav-links a {
  display: inline-flex;
  align-items: center;
  height: 100%;
  text-decoration: none;
  color: var(--ink-muted);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 1px;
  position: relative;
  transition: color 0.25s;
}
.nav-links a:not(.nav-cta):hover { color: var(--ink); }
.nav-links a.active { color: var(--ink); }
.nav-links a:not(.nav-cta)::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--gold);
  transform: scaleX(0);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.nav-links a.active::after,
.nav-links a:not(.nav-cta):hover::after { transform: scaleX(1); }
.nav-cta {
  display: inline-flex !important;
  align-items: center !important;
  height: auto !important;
  padding: 8px 24px !important;
  background: var(--ink) !important;
  color: var(--parchment) !important;
  border-radius: 6px !important;
  font-size: 13px !important;
  font-weight: 600 !important;
  letter-spacing: 1.5px !important;
  transition: background 0.25s, transform 0.2s !important;
}
.nav-cta:hover {
  background: var(--ink-soft) !important;
  transform: translateY(-1px);
}
.theme-toggle {
  background: none;
  border: 1px solid var(--parchment-d);
  border-radius: 6px;
  width: 36px; height: 36px;
  cursor: pointer;
  font-size: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
  color: var(--ink-muted);
  flex-shrink: 0;
}
.theme-toggle:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-dim);
}

/* ═══════════════════════════════════════════
   HAMBURGER MENU
   ═══════════════════════════════════════════ */
.hamburger {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  z-index: 1001;
}

.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--ink);
  margin: 5px 0;
  transition: all 0.3s;
}

@media (max-width: 768px) {
  .hamburger {
    display: block;
  }

  .nav-links {
    position: fixed;
    top: 0;
    right: -100%;
    width: 280px;
    height: 100vh;
    background: var(--parchment);
    flex-direction: column;
    padding: 80px 24px 24px;
    transition: right 0.3s;
    box-shadow: -4px 0 20px rgba(0,0,0,0.1);
  }

  .nav-links.active {
    right: 0;
  }

  .nav-links a {
    height: auto;
    padding: 12px 0;
    font-size: 16px;
  }

  .filter-btn {
    min-height: 44px;
    min-width: 44px;
    padding: 10px 16px;
  }
}

/* ═══════════════════════════════════════════
   PAGE HEADER
   ═══════════════════════════════════════════ */
.page-header {
  text-align: center;
  padding: 112px 24px 32px;
  position: relative;
}
.page-header h1 {
  font-family: var(--display);
  font-size: clamp(28px, 4vw, 40px);
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 6px;
}
.page-header .page-en {
  font-size: 11px;
  color: var(--ink-ghost);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-top: 6px;
}
.page-header .page-line {
  width: 48px;
  height: 2px;
  background: var(--gold);
  margin: 20px auto 0;
}

/* ═══════════════════════════════════════════
   FILTER BAR
   ═══════════════════════════════════════════ */
.filters {
  padding: 0 clamp(24px, 5vw, 64px) 8px;
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
  justify-content: center;
}
.filter-group {
  display: flex;
  gap: 2px;
  background: var(--parchment-l);
  border: 1px solid var(--parchment-d);
  border-radius: 8px;
  padding: 3px;
}
.filter-btn {
  padding: 7px 16px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--ink-muted);
  font-size: 13px;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.filter-btn:hover {
  color: var(--ink);
  background: rgba(184,150,62,0.06);
}
.filter-btn.active {
  background: var(--ink);
  color: var(--parchment);
  box-shadow: 0 2px 8px rgba(30,26,20,0.15);
}
.filter-sep {
  width: 1px;
  height: 28px;
  background: var(--parchment-d);
  flex-shrink: 0;
}
.card-count {
  font-size: 13px;
  color: var(--ink-ghost);
  letter-spacing: 1px;
  font-weight: 500;
  padding: 8px 0;
}

/* ═══════════════════════════════════════════
   CARD GRID
   ═══════════════════════════════════════════ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
  padding: 32px clamp(24px, 5vw, 64px) 80px;
  max-width: 1200px;
  margin: 0 auto;
}

.card-item {
  background: var(--parchment-l);
  border: 2px solid var(--parchment-d);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.card-item:hover {
  transform: translateY(-6px);
  border-color: var(--gold);
  box-shadow: 0 16px 40px rgba(30,26,20,0.12), 0 0 0 1px var(--gold), 0 0 20px rgba(184,150,62,0.2);
}
.card-item.RARE:hover {
  border-color: var(--sapphire);
  box-shadow: 0 16px 40px rgba(58,107,140,0.15), 0 0 0 1px var(--sapphire), 0 0 20px rgba(58,107,140,0.2);
}
.card-item.LEGENDARY:hover {
  border-color: var(--gold-light);
  box-shadow: 0 16px 40px rgba(184,150,62,0.2), 0 0 0 1px var(--gold-light), 0 0 24px rgba(184,150,62,0.3);
}

.card-item img {
  width: 100%;
  display: block;
  aspect-ratio: 3/2;
  object-fit: cover;
  background: var(--parchment-d);
  border-radius: 10px 10px 0 0;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
.card-item:hover img { transform: scale(1.03); }

.card-item-info {
  padding: 12px 14px;
  border-top: 1px solid var(--parchment-d);
}
.card-item-name {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.5px;
}
.card-item-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
}
.card-cost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  background: var(--ink);
  color: var(--gold);
  border-radius: 50%;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--serif);
}
.card-cost.curse { background: var(--cinnabar); color: #fff; }
.card-rarity {
  font-size: 11px;
  letter-spacing: 1px;
  font-weight: 500;
}
.card-rarity.COMMON { color: var(--ink-ghost); }
.card-rarity.RARE { color: var(--sapphire); }
.card-rarity.LEGENDARY { color: var(--gold); }

/* ═══════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(30,26,20,0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  transition: opacity 0.3s;
}
.modal-overlay.open {
  display: flex;
  opacity: 1;
}

.modal {
  background: var(--parchment-l);
  border-radius: 14px;
  max-width: 480px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  border: 1px solid var(--parchment-d);
  box-shadow: 0 32px 80px rgba(30,26,20,0.25), 0 0 0 1px rgba(184,150,62,0.08);
  transform: translateY(16px) scale(0.97);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
}

.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  width: 36px; height: 36px;
  border: 1px solid var(--parchment-d);
  background: var(--parchment-l);
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  color: var(--ink-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  z-index: 10;
}
.modal-close:hover {
  background: var(--ink);
  color: var(--parchment);
  border-color: var(--ink);
}

.modal-img-wrap {
  position: relative;
  overflow: hidden;
  border-radius: 14px 14px 0 0;
}
.modal-img-wrap::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: linear-gradient(to top, var(--parchment-l), transparent);
  pointer-events: none;
}
.modal-img {
  width: 100%;
  aspect-ratio: 3/2;
  object-fit: cover;
  display: block;
  background: var(--parchment-d);
}

.modal-body {
  padding: 20px 28px 28px;
}
.modal-name {
  font-family: var(--display);
  font-size: 24px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 3px;
}
.modal-meta {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.modal-tag {
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 4px;
  background: var(--parchment-d);
  color: var(--ink-muted);
  letter-spacing: 0.5px;
  font-weight: 500;
}
.modal-tag.cost {
  background: var(--ink);
  color: var(--gold);
  font-family: var(--serif);
  font-weight: 700;
}
.modal-tag.cost.curse {
  background: var(--cinnabar);
  color: #fff;
}
.modal-tag.RARE {
  background: rgba(58,107,140,0.1);
  color: var(--sapphire);
}
.modal-tag.LEGENDARY {
  background: var(--gold-dim);
  color: var(--gold);
}

.modal-divider {
  width: 100%;
  height: 1px;
  background: var(--parchment-d);
  margin: 20px 0;
  position: relative;
}
.modal-divider::before {
  content: '◆';
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  background: var(--parchment-l);
  padding: 0 12px;
  color: var(--gold);
  font-size: 8px;
  letter-spacing: 4px;
}

.modal-desc {
  font-size: 15px;
  color: var(--ink-soft);
  line-height: 1.9;
}
.modal-detail {
  font-size: 13px;
  color: var(--ink-muted);
  line-height: 1.7;
  margin-top: 16px;
  padding: 14px 16px;
  background: var(--parchment);
  border-radius: 8px;
  border-left: 3px solid var(--gold);
}
.modal-upgraded {
  font-size: 13px;
  color: var(--jade);
  line-height: 1.7;
  margin-top: 12px;
  padding: 14px 16px;
  background: rgba(74,124,57,0.04);
  border-radius: 8px;
  border-left: 3px solid var(--jade);
}
.modal-upgraded-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--jade);
  letter-spacing: 1px;
  margin-bottom: 6px;
  text-transform: uppercase;
}

/* ═══════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════ */
@media (max-width: 768px) {
  .card-grid {
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    padding: 20px 16px 60px;
  }
  .filters { gap: 10px; padding: 0 16px 8px; }
  .filter-group { padding: 2px; }
  .filter-btn { padding: 6px 12px; font-size: 12px; }
  .page-header { padding: 96px 16px 24px; }
}
@media (max-width: 480px) {
  .card-grid {
    grid-template-columns: repeat(2, 1fr);
    padding: 16px 12px 48px;
  }
  .filter-sep { display: none; }
  .filters { justify-content: center; }
  .modal { margin: 0 8px; border-radius: 12px; }
  .modal-body { padding: 16px 20px 20px; }
}
</style>
</head>

</nav>

<div class="page-header">

</div>

    <button class="filter-btn" data-value="ABILITY">能力</button>

  <div class="filter-group" data-group="rarity">
    <button class="filter-btn active" data-value="all">全部</button>

    <button class="filter-btn" data-value="RARE">稀有</button>

  <div class="card-count" id="count"></div>
</div>

<!-- Card Detail Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">

      <img class="modal-img" id="modal-img" src="" alt="">
    </div>

        <div class="modal-upgraded-label">升级后</div>
        <span id="modal-upgraded-text"></span>
      </div>
    </div>
  </div>
</div>

<script src="cards-data.js"></script>
<script>
const TYPE_LABELS = {ATTACK:'攻击',SKILL:'技能',ABILITY:'能力',CURSE:'诅咒',STATUS:'状态'};
const RARITY_LABELS = {COMMON:'普通',RARE:'稀有',LEGENDARY:'传说'};
const CHAR_LABELS = {xiaoyan:'萧炎',xuner:'薰儿',cailin:'彩鳞',shared:'通用'};

const state = { character:'all', type:'all', rarity:'all' };
const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const modal = document.getElementById('modal');

function renderCards() {
  grid.innerHTML = '';
  let visible = 0;
  CARDS.forEach((c, i) => {
    const match = (state.character==='all'||c.character===state.character)
      && (state.type==='all'||c.type===state.type)
      && (state.rarity==='all'||c.rarity===state.rarity);
    if (!match) return;
    visible++;

    const div = document.createElement('div');
    div.className = `card-item ${c.rarity}`;
    div.style.animationDelay = `${Math.min(visible * 20, 400)}ms`;
    div.onclick = () => openModal(c);
    const imgSrc = `assets/cards/${c.imgDir}/${c.img}`;
    const costCls = c.type==='CURSE' ? 'card-cost curse' : 'card-cost';
    const costVal = c.cost < 0 ? 'X' : c.cost;
    div.innerHTML = `
      <img src="${imgSrc}" alt="${c.name}" loading="lazy">
      <div class="card-item-info">
        <div class="card-item-name">${c.name}</div>
        <div class="card-item-meta">
          <span class="${costCls}">${costVal}</span>
          <span class="card-rarity ${c.rarity}">${RARITY_LABELS[c.rarity]||''}</span>
        </div>
      </div>`;
    grid.appendChild(div);
  });
  countEl.textContent = `${visible} 张`;
}

// Filters
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  const group = btn.closest('.filter-group').dataset.group;
  state[group] = btn.dataset.value;
  btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
});

// Modal
function openModal(c) {
  document.getElementById('modal-img').src = `assets/cards/${c.imgDir}/${c.img}`;
  document.getElementById('modal-img').alt = c.name;
  document.getElementById('modal-name').textContent = c.name;

  let meta = '';
  const costCls = c.type==='CURSE' ? 'modal-tag cost curse' : 'modal-tag cost';
  const costVal = c.cost < 0 ? 'X' : c.cost;
  meta += `<span class="${costCls}">${costVal} 费</span>`;
  meta += `<span class="modal-tag">${TYPE_LABELS[c.type]||c.type}</span>`;
  meta += `<span class="modal-tag ${c.rarity}">${RARITY_LABELS[c.rarity]||''}</span>`;
  meta += `<span class="modal-tag">${CHAR_LABELS[c.character]||''}</span>`;
  document.getElementById('modal-meta').innerHTML = meta;

  document.getElementById('modal-desc').textContent = c.desc;

  const detailEl = document.getElementById('modal-detail');
  detailEl.style.display = c.detail ? '' : 'none';
  if (c.detail) detailEl.textContent = c.detail;

  const upWrap = document.getElementById('modal-upgraded');
  const upText = document.getElementById('modal-upgraded-text');
  const hasUpgrade = c.upgraded && c.upgraded !== c.desc;
  upWrap.style.display = hasUpgrade ? '' : 'none';
  if (hasUpgrade) upText.textContent = c.upgraded;

  requestAnimationFrame(() => {
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  });
}

function closeModal() {
  modal.classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modal-close').onclick = closeModal;
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderCards();

function openCardFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const cardId = params.get('card');
  if (!cardId) return;
  const card = CARDS.find(c => c.id === cardId);
  if (card) openModal(card);
}
openCardFromUrl();

// Dark mode toggle
(function(){
  const toggle = document.getElementById('theme-toggle');
  const stored = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const initial = stored || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', initial);
  toggle.textContent = initial === 'dark' ? '☀' : '☽';
  toggle.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    toggle.textContent = next === 'dark' ? '☀' : '☽';
  });
})();
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const lazyImages = document.querySelectorAll('img[data-src]');
  if ('IntersectionObserver' in window) {
    const imageObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          const img = entry.target;
          img.src = img.dataset.src;
          img.removeAttribute('data-src');
          imageObserver.unobserve(img);
        }
      });
    }, { rootMargin: '50px 0px' });
    lazyImages.forEach(function(img) { imageObserver.observe(img); });
  } else {
    lazyImages.forEach(function(img) {
      img.src = img.dataset.src;
      img.removeAttribute('data-src');
    });
  }
});
</script>
<noscript><style>img[data-src] { display: none; }</style></noscript>

<script>
const hamburger = document.getElementById('hamburger');
const navLinks = document.querySelector('.nav-links');

if (hamburger && navLinks) {
  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('active');
  });

  navLinks.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('active');
    });
  });
}
</script>
